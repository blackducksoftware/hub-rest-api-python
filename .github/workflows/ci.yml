name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Verify lockfile present
      run: test -f requirements.lock.txt || (echo "requirements.lock.txt missing — run pip-compile --generate-hashes requirements.txt -o requirements.lock.txt and commit it" && exit 1)

    - name: Install dependencies (hash-verified)
      run: pip install --require-hashes -r requirements.lock.txt

    - name: Run tests
      run: pytest test/
