project:
  name: "hub-rest-api-python"

application:
  name: "Data Science"

branch:
  name: "${POLARIS_BRANCH_NAME:master}"
  parent:
    name: "${POLARIS_PARENT_BRANCH:master}"

server:
  url: "${POLARIS_SERVER_URL:https://polaris.blackduck.com}"

assessment:
  types: ["SAST", "SCA"]

access:
  token: "${POLARIS_ACCESS_TOKEN}"

analysis:
  mode: "cloud"

capture:
  fileSystem:
    captureDirs:
      - "blackduck/"
    excludePatterns:
      - "**/.git/**"
      - "**/__pycache__/**"
      - "**/venv/**"
      - "**/.venv/**"
      - "**/node_modules/**"
      - "**/bridge-cli*/**"
      - "**/polaris-output/**"
      - "**/polaris-reports/**"
  python:
    includeRequirementsFiles: true
    requirementsFiles:
      - "requirements.txt"

reporting:
  sarif:
    create: true
    file: "polaris-results.sarif"
  pdf:
    create: true
    path: "./polaris-reports/"

prComment:
  enabled: true

upload:
  localConfig: true

timeout:
  analysis: 3600
